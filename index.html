<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ตั้งสายขิม boymissu (Smart Tuner)</title>
    <style>
        :root {
            --wood-dark: #3e2723; --wood-main: #5d4037; --accent-blue: #00f2fe; 
            --bridge-red: #b71c1c; --gold: #f1c40f; --white: #ffffff;
            --success-green: #00e676; --panel-bg: #2d1b18; --dark-bg: #1a1a1a;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0; font-family: 'Tahoma', sans-serif;
            background-color: var(--dark-bg); color: var(--white);
            height: 100dvh; display: flex; justify-content: center; overflow: hidden;
        }
        .app-container {
            width: 100%; height: 100%; max-width: 1400px;
            background: #fdf5e6; display: flex; flex-direction: column; position: relative;
        }
        .mode-header {
            background: var(--panel-bg); padding: 10px; display: flex; justify-content: center; gap: 8px; border-bottom: 3px solid var(--gold); z-index: 20;
        }
        .m-btn {
            flex: 1; max-width: 200px; background: #444; border: 2px solid transparent; 
            color: white; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 0.85em; font-weight: bold;
        }
        .m-btn.active { background: var(--gold); color: #7b241c; border-color: white; }

        .main-content { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

        /* Visual Panel */
        .visual-panel { flex: 0.8; display: flex; flex-direction: column; background: #e5d9c5; border-bottom: 4px solid var(--bridge-red); }
        .instrument-box { flex: 1; display: flex; align-items: center; justify-content: center; padding: 10px; }
        #khim-svg { width: 100%; max-width: 420px; height: auto; }
        .khim-string { stroke: #1a0f0d; stroke-width: 0.8; opacity: 0.4; }
        .string-highlight { fill: var(--accent-blue); opacity: 0; cursor: pointer; }
        .string-highlight.active { opacity: 1; filter: drop-shadow(0 0 5px var(--accent-blue)); }

        /* Tuner Display */
        .tuner-display { background: #4dd0e1; padding: 15px; text-align: center; border-top: 4px solid #d32f2f; }
        .tuner-info { display: flex; justify-content: center; align-items: baseline; gap: 15px; margin-bottom: 5px; }
        .note-name-big { font-size: 2.2em; font-weight: bold; color: #000; }
        .hz-target-small { font-size: 1.2em; font-weight: bold; color: #d32f2f; }
        .live-hz-box {
            background: var(--gold); color: #7b241c; padding: 8px 25px; border-radius: 12px; 
            font-size: 2.5em; font-weight: bold; border: 3px solid white; display: inline-block; min-width: 180px;
        }
        .live-hz-box.match { background-color: var(--success-green) !important; color: #000; }
        
        .scale-wrap { width: 100%; position: relative; height: 35px; margin-top: 10px; }
        .scale-line { width: 100%; height: 2px; background: white; position: absolute; top: 15px; left: 0; right: 0; }
        .needle { position: absolute; top: 0; left: 50%; width: 4px; height: 30px; background: #ff3d00; transform: translateX(-50%); transition: left 0.1s ease-out; z-index: 5; }
        .center-mark { position: absolute; left: 50%; top: 5px; width: 2px; height: 20px; background: #000; opacity: 0.5; }

        /* Control Panel */
        .control-panel { flex: 1.2; display: flex; flex-direction: column; background: var(--bridge-red); overflow: hidden; }
        .bridge-tabs { display: flex; background: var(--panel-bg); padding: 6px; gap: 6px; }
        .tab { flex: 1; padding: 14px 5px; text-align: center; cursor: pointer; border-radius: 6px; font-weight: bold; color: #aaa; font-size: 0.85em; }
        .tab.active { background: var(--bridge-red); color: white; box-shadow: inset 0 0 8px rgba(0,0,0,0.3); }

        .note-grid-container { flex: 1; overflow-y: auto; padding: 15px; }
        .note-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .note-btn { background: rgba(255,255,255,0.1); padding: 20px 10px; border-radius: 15px; display: flex; flex-direction: column; align-items: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); transition: 0.2s; }
        .note-btn.active { background: var(--gold); color: #7b241c; border-color: white; }
        .note-btn.active .n, .note-btn.active .h { color: #7b241c; }
        .note-btn .n { font-size: 1.4em; font-weight: bold; }
        .note-btn .h { font-size: 0.9em; opacity: 0.8; }

        /* Overlay */
        #start-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        #start-btn { padding: 25px 60px; font-size: 2em; background: var(--gold); border: none; border-radius: 50px; font-weight: bold; color: #7b241c; cursor: pointer; box-shadow: 0 0 20px rgba(241, 196, 15, 0.5); }
        .device-info { color: #aaa; margin-top: 15px; font-size: 0.9em; }

        /* Desktop Layout */
        @media (min-width: 992px) {
            .main-content { flex-direction: row; }
            .visual-panel { flex: 1; border-right: 4px solid var(--bridge-red); border-bottom: none; }
            .control-panel { flex: 1; }
            .tuner-display { padding: 40px 20px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div id="start-overlay">
        <h1 style="color: var(--gold); margin-bottom: 5px;">ตั้งสายขิม โดย boymissu</h1>
        <p style="color: white; margin-bottom: 30px;">Dual Mode: กรมศิลป์ & สากล</p>
        <button id="start-btn">เริ่มใช้งาน</button>
        <div id="device-tag" class="device-info">กำลังตรวจสอบอุปกรณ์...</div>
    </div>

    <header class="mode-header">
        <button id="btnThai" class="m-btn active" onclick="changeMode('thai')">กรมศิลป์ (โด 508.5)</button>
        <button id="btnInter" class="m-btn" onclick="changeMode('inter')">สากล (A=440)</button>
    </header>

    <main class="main-content">
        <section class="visual-panel">
            <div class="instrument-box">
                <svg id="khim-svg" viewBox="0 0 140 85">
                    <path d="M25,10 L115,10 Q140,10 135,40 Q130,75 115,77 L25,77 Q10,75 5,40 Q0,10 25,10 Z" fill="var(--wood-dark)"/>
                    <path d="M28,13 L112,13 Q132,13 128,40 Q124,70 112,72 L28,72 Q15,70 11,40 Q7,13 28,13 Z" fill="var(--wood-main)"/>
                    <rect x="55" y="15" width="2" height="58" fill="var(--bridge-red)"/> 
                    <rect x="85" y="15" width="2" height="58" fill="var(--bridge-red)"/> 
                    <g id="strings-group"></g>
                    <g id="highlights-group"></g>
                </svg>
            </div>
            
            <div class="tuner-display">
                <div class="tuner-info">
                    <span id="display-note" class="note-name-big">โด</span>
                    <span id="display-hz-target" class="hz-target-small">508.5 Hz</span>
                </div>
                <div id="live-hz-val" class="live-hz-box">--- Hz</div>
                <div class="scale-wrap">
                    <div class="scale-line"></div>
                    <div class="center-mark"></div>
                    <div id="needle" class="needle"></div>
                </div>
            </div>
        </section>

        <section class="control-panel">
            <div class="bridge-tabs">
                <div class="tab" id="tab-left" onclick="setBridge('left')">หย่องนอก</div>
                <div class="tab active" id="tab-middle" onclick="setBridge('middle')">หย่องกลาง</div>
                <div class="tab" id="tab-right" onclick="setBridge('right')">หย่องใน</div>
            </div>
            <div class="note-grid-container">
                <div id="note-grid" class="note-grid"></div>
            </div>
        </section>
    </main>
</div>

<script>
    let currentMode = 'thai', currentBridge = 'middle', targetHz = 508.5;
    let audioCtx, analyser, pitchSamples = [], lastT = 0;

    const thaiHz = {
        left: [754.6, 683.4, 618.9, 560.5, 507.6, 459.7, 416.3],
        middle: [508.5, 460.5, 417.0, 377.6, 342.0, 309.7, 280.5],
        right: [342.0, 309.7, 280.5, 254.0, 230.0, 208.3, 188.6]
    };
    const semitones = {
        left: [10, 8, 7, 5, 3, 2, 0], middle: [3, 2, 0, -2, -4, -5, -7], right: [-4, -5, -7, -9, -10, -12, -14]
    };
    const noteNames = {
        left: ["ซอล (สูง)", "ฟาร์", "มี", "เร", "โด", "ที", "ลา"],
        middle: ["โด", "ที", "ลา", "ซอล", "ฟาร์", "มี", "เร"],
        right: ["ฟาร์", "มี", "เร", "โด", "ที", "ลา", "ซอล (ทุ้ม)"]
    };

    function isMobile() {
        return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    }

    function initUI() {
        const sg = document.getElementById('strings-group');
        const hg = document.getElementById('highlights-group');
        const ng = document.getElementById('note-grid');
        sg.innerHTML = ''; hg.innerHTML = ''; ng.innerHTML = '';

        for(let i=0; i<7; i++) {
            let y = 20 + (i*8);
            sg.innerHTML += `<line x1="12" y1="${y}" x2="128" y2="${y}" class="khim-string"></line>`;
        }

        const xP = { left: 30, middle: 65, right: 100 };
        ['left','middle','right'].forEach(bk => {
            noteNames[bk].forEach((n, i) => {
                const hz = getHz(bk, i);
                const isActive = Math.abs(hz - targetHz) < 0.1;
                hg.innerHTML += `<rect x="${xP[bk]}" y="${20+(i*8)-2.5}" width="15" height="5" rx="2" class="string-highlight ${isActive?'active':''}" onclick="selectNote('${n}', ${hz})"></rect>`;
                if(bk === currentBridge) {
                    ng.innerHTML += `<div class="note-btn ${isActive?'active':''}" onclick="selectNote('${n}', ${hz})"><span class="n">${n}</span><span class="h">${hz} Hz</span></div>`;
                }
            });
        });
    }

    function getHz(b, i) {
        if (currentMode === 'thai') return thaiHz[b][i];
        return parseFloat((440 * Math.pow(2, semitones[b][i] / 12)).toFixed(1));
    }

    function selectNote(n, h) {
        targetHz = h;
        document.getElementById('display-note').innerText = n;
        document.getElementById('display-hz-target').innerText = h + " Hz";
        initUI();
    }

    function changeMode(m) { 
        currentMode = m; 
        document.getElementById('btnThai').className = m==='thai'?'m-btn active':'m-btn';
        document.getElementById('btnInter').className = m==='inter'?'m-btn active':'m-btn';
        const i = noteNames[currentBridge].indexOf(document.getElementById('display-note').innerText);
        selectNote(document.getElementById('display-note').innerText, getHz(currentBridge, i===-1?0:i));
    }

    function setBridge(b) {
        currentBridge = b;
        ['left','middle','right'].forEach(k => document.getElementById('tab-'+k).classList.toggle('active', k===b));
        selectNote(noteNames[b][0], getHz(b, 0));
    }

    async function start() {
        try {
            const mobile = isMobile();
            const constraints = {
                audio: mobile ? { 
                    echoCancellation: false, 
                    noiseSuppression: false, 
                    autoGainControl: false 
                } : {
                    echoCancellation: true,
                    noiseSuppression: true
                }
            };

            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const sr = audioCtx.sampleRate;
            
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = mobile ? 2048 : 4096; // คอมใช้ความละเอียดสูงขึ้น
            
            audioCtx.createMediaStreamSource(stream).connect(analyser);
            document.getElementById('start-overlay').style.display = 'none';
            
            loop(performance.now(), sr);
        } catch (e) {
            alert("ไม่สามารถเข้าถึงไมค์ได้: " + e.message);
        }
    }

    function loop(t, sr) {
        const buf = new Float32Array(analyser.fftSize);
        analyser.getFloatTimeDomainData(buf);
        
        let rms = 0; for(let i=0; i<buf.length; i++) rms += buf[i]*buf[i];
        rms = Math.sqrt(rms/buf.length);

        if (rms > 0.012) {
            const p = detectPitch(buf, sr);
            if (p !== -1 && p > 50 && p < 1200) pitchSamples.push(p);
        }

        if (t - lastT > 100) {
            const liveBox = document.getElementById('live-hz-val');
            const needle = document.getElementById('needle');
            if (pitchSamples.length > 0) {
                const avg = pitchSamples.reduce((a,b)=>a+b)/pitchSamples.length;
                liveBox.innerText = avg.toFixed(1) + " Hz";
                const diff = avg - targetHz;
                // ปรับ sensitivity เข็ม (ขีดละประมาณ 10 Hz)
                needle.style.left = Math.max(5, Math.min(95, 50 + (diff * 3.5))) + "%";
                liveBox.classList.toggle('match', Math.abs(diff) < 0.8);
                pitchSamples = [];
            }
            lastT = t;
        }
        requestAnimationFrame((time) => loop(time, sr));
    }

    function detectPitch(buf, sr) {
        let size = buf.length;
        let c = new Float32Array(size);
        for (let i=0; i<size; i++) {
            for (let j=0; j<size-i; j++) c[i] += buf[j]*buf[j+i];
        }
        let d = 0; while (c[d] > c[d+1]) d++;
        let maxC = -1, maxP = -1;
        for (let i=d; i<size; i++) {
            if (c[i] > maxC) { maxC = c[i]; maxP = i; }
        }
        return maxP !== -1 ? sr/maxP : -1;
    }

    // Bind events
    document.getElementById('start-btn').addEventListener('click', start);
    window.onload = () => {
        document.getElementById('device-tag').innerText = isMobile() ? "ตรวจพบ: อุปกรณ์มือถือ (โหมด Raw Audio)" : "ตรวจพบ: คอมพิวเตอร์ (โหมด Standard)";
        initUI();
    };
</script>
</body>
</html>
