<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ตั้งสายขิม โดย boymissu</title>
    <style>
        :root {
            --wood-dark: #3e2723; --wood-main: #5d4037; --accent-blue: #00f2fe; 
            --bridge-red: #b71c1c; --gold: #f1c40f; --white: #ffffff;
            --success-green: #00e676; --panel-bg: #2d1b18; --dark-bg: #1a1a1a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0; font-family: 'Tahoma', sans-serif;
            background-color: var(--dark-bg); color: var(--white);
            height: 100dvh; display: flex; justify-content: center; overflow: hidden;
        }

        .app-container {
            width: 100%; height: 100%; max-width: 1400px;
            background: #fdf5e6; display: flex; flex-direction: column;
            position: relative;
        }

        /* Header */
        .mode-header {
            background: var(--panel-bg); padding: 12px; 
            display: flex; justify-content: center; gap: 10px; 
            border-bottom: 3px solid var(--gold); z-index: 20;
        }
        .m-btn {
            flex: 1; max-width: 200px; background: #444; border: 2px solid transparent; 
            color: white; padding: 10px; border-radius: 8px; 
            cursor: pointer; font-size: 0.9em; font-weight: bold; transition: 0.3s;
        }
        .m-btn.active { background: var(--gold); color: #7b241c; border-color: white; }

        /* Main Content Layout */
        .main-content {
            display: flex; flex-direction: column; flex: 1; overflow: hidden;
        }

        /* Left Section: Visual & Tuner */
        .visual-panel {
            flex: 0.8; display: flex; flex-direction: column; 
            background: #e5d9c5; border-bottom: 4px solid var(--bridge-red);
        }

        .instrument-box {
            flex: 1; display: flex; align-items: center; justify-content: center; padding: 15px;
        }
        #khim-svg { width: 100%; max-width: 450px; height: auto; }
        .khim-string { stroke: #1a0f0d; stroke-width: 0.8; opacity: 0.4; }
        .string-highlight { fill: var(--accent-blue); opacity: 0; transition: 0.2s; cursor: pointer; }
        .string-highlight.active { opacity: 1; filter: drop-shadow(0 0 8px var(--accent-blue)); }

        .tuner-display {
            background: #4dd0e1; padding: 15px; text-align: center;
            border-top: 4px solid #d32f2f;
        }

        /* Right Section: Controls */
        .control-panel {
            flex: 1.2; display: flex; flex-direction: column; background: var(--bridge-red); overflow: hidden;
        }

        .bridge-tabs { 
            display: flex; background: var(--panel-bg); padding: 6px; gap: 6px;
        }
        .tab { 
            flex: 1; padding: 14px 5px; text-align: center; cursor: pointer; 
            border-radius: 6px; font-weight: bold; color: #aaa; font-size: 0.85em; transition: 0.2s;
        }
        .tab.active { background: var(--bridge-red); color: var(--white); box-shadow: inset 0 0 10px rgba(0,0,0,0.3); }

        .note-grid-container {
            flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch;
        }
        .note-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
        }
        .note-btn {
            background: rgba(255,255,255,0.08); padding: 20px 10px; border-radius: 15px;
            display: flex; flex-direction: column; align-items: center; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.15); transition: 0.2s;
        }
        .note-btn.active { background: var(--gold); border-color: white; transform: scale(0.97); }
        .note-btn .n { font-size: 1.4em; font-weight: bold; color: white; }
        .note-btn .h { font-size: 0.9em; color: rgba(255,255,255,0.7); }
        .note-btn.active .n, .note-btn.active .h { color: #7b241c; }

        /* Tuner Elements */
        .tuner-info { display: flex; justify-content: space-around; align-items: center; margin-bottom: 10px; }
        .note-name-big { font-size: 2.2em; font-weight: bold; color: #000; }
        .hz-target-small { font-size: 1.2em; font-weight: bold; color: #d32f2f; }
        
        .live-hz-box {
            background: var(--gold); color: #7b241c; margin: 5px auto;
            padding: 10px 25px; border-radius: 12px; font-size: 2.5em; font-weight: bold;
            border: 3px solid white; display: inline-block; min-width: 180px;
        }
        .live-hz-box.match { background-color: var(--success-green) !important; color: #000; }

        .scale-wrap { width: 100%; position: relative; height: 40px; margin-top: 10px; padding: 0 10px; }
        .scale-line { width: 100%; height: 2px; background: white; position: relative; top: 20px; }
        .scale-center { position: absolute; left: 50%; top: 10px; height: 20px; width: 2px; background: #000; }
        .needle {
            position: absolute; top: 0; left: 50%; width: 4px; height: 30px;
            background: #ff3d00; transform: translateX(-50%); transition: left 0.1s ease-out;
        }

        /* Overlay */
        #start-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #start-btn { padding: 25px 60px; font-size: 2em; background: var(--gold); border: none; border-radius: 50px; font-weight: bold; color: #7b241c; cursor: pointer; box-shadow: 0 0 20px var(--gold); }

        /* --- DESKTOP / TABLET LANDSCAPE --- */
        @media (min-width: 992px) {
            .main-content { flex-direction: row; }
            .visual-panel { flex: 1; border-bottom: none; border-right: 4px solid var(--bridge-red); }
            .control-panel { flex: 1; }
            .instrument-box { padding: 40px; }
            .note-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .tuner-display { padding: 40px 20px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div id="start-overlay">
        <h1 style="color: var(--gold); margin-bottom: 20px;">ตั้งสายขิม โดย boymissu</h1>
        <button id="start-btn">เริ่มใช้งาน</button>
    </div>

    <header class="mode-header">
        <button id="btnThai" class="m-btn active" onclick="changeMode('thai')">กรมศิลป์ (โด 508.5)</button>
        <button id="btnInter" class="m-btn" onclick="changeMode('inter')">สากล (A=440)</button>
    </header>

    <main class="main-content">
        <section class="visual-panel">
            <div class="instrument-box">
                <svg id="khim-svg" viewBox="0 0 140 85">
                    <path d="M25,10 L115,10 Q140,10 135,40 Q130,75 115,77 L25,77 Q10,75 5,40 Q0,10 25,10 Z" fill="var(--wood-dark)"/>
                    <path d="M28,13 L112,13 Q132,13 128,40 Q124,70 112,72 L28,72 Q15,70 11,40 Q7,13 28,13 Z" fill="var(--wood-main)"/>
                    <rect x="55" y="15" width="2" height="58" fill="var(--bridge-red)"/> 
                    <rect x="85" y="15" width="2" height="58" fill="var(--bridge-red)"/> 
                    <g id="strings-group"></g>
                    <g id="highlights-group"></g>
                </svg>
            </div>
            
            <div class="tuner-display">
                <div class="tuner-info">
                    <span class="note-name-big" id="display-note">โด</span>
                    <span class="hz-target-small" id="display-hz-target">508.5 Hz</span>
                </div>
                <div class="live-hz-box" id="live-hz-val">0.0 Hz</div>
                <div class="scale-wrap">
                    <div class="scale-line"></div>
                    <div class="scale-center"></div>
                    <div id="needle" class="needle"></div>
                </div>
            </div>
        </section>

        <section class="control-panel">
            <div class="bridge-tabs">
                <div class="tab" data-b="left">หย่องนอก</div>
                <div class="tab active" data-b="middle">หย่องกลาง</div>
                <div class="tab" data-b="right">หย่องใน</div>
            </div>
            <div class="note-grid-container">
                <div id="note-grid" class="note-grid"></div>
            </div>
        </section>
    </main>
</div>

<script>
    let currentMode = 'thai', currentBridge = 'middle', targetHz = 508.5;
    let audioContext, analyser, lastUpdateTime = 0, pitchSamples = [];

    const thaiHz = {
        left: [754.6, 683.4, 618.9, 560.5, 507.6, 459.7, 416.3],
        middle: [508.5, 460.5, 417.0, 377.6, 342.0, 309.7, 280.5],
        right: [342.0, 309.7, 280.5, 254.0, 230.0, 208.3, 188.6]
    };

    const semitones = {
        left: [10, 8, 7, 5, 3, 2, 0], middle: [3, 2, 0, -2, -4, -5, -7], right: [-4, -5, -7, -9, -10, -12, -14]
    };

    const noteNames = {
        left: ["ซอล (สูง)", "ฟาร์", "มี", "เร", "โด", "ที", "ลา"],
        middle: ["โด", "ที", "ลา", "ซอล", "ฟาร์", "มี", "เร"],
        right: ["ฟาร์", "มี", "เร", "โด", "ที", "ลา", "ซอล (ทุ้ม)"]
    };

    function getHz(bridge, index) {
        if (currentMode === 'thai') return thaiHz[bridge][index];
        return parseFloat((440 * Math.pow(2, semitones[bridge][index] / 12)).toFixed(1));
    }

    function initVisuals() {
        const svgStrings = document.getElementById('strings-group');
        const svgHighs = document.getElementById('highlights-group');
        svgStrings.innerHTML = ''; svgHighs.innerHTML = '';
        for(let i=0; i<7; i++) {
            let y = 20 + (i*8);
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", "12"); line.setAttribute("y1", y); line.setAttribute("x2", "128"); line.setAttribute("y2", y);
            line.setAttribute("class", "khim-string");
            svgStrings.appendChild(line);
        }
        const xPos = { left: 30, middle: 65, right: 100 };
        ['left', 'middle', 'right'].forEach(bKey => {
            noteNames[bKey].forEach((name, idx) => {
                const hz = getHz(bKey, idx);
                const rect = document.
