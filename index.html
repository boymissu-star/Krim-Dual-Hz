<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ตั้งสายขิม boymissu (Smart Dual-Engine)</title>
    <style>
        :root {
            --wood: #5d4037; --accent: #00f2fe; --gold: #f1c40f;
            --bridge: #b71c1c; --bg: #1a1a1a; --success: #00e676;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body {
            margin: 0; font-family: 'Tahoma', sans-serif; background: var(--bg); color: white;
            height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
        }
        
        /* Layout Sections */
        .visual-box { flex: 1; display: flex; align-items: center; justify-content: center; padding: 10px; background: #e5d9c5; }
        #khim-svg { width: 100%; max-width: 400px; height: auto; }
        
        .display-box { 
            flex: 0.8; background: #4dd0e1; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; border-top: 4px solid var(--bridge);
        }
        .hz-live { font-size: 3.5rem; font-weight: bold; color: #7b241c; line-height: 1; }
        .hz-target { font-size: 1.1rem; color: #d32f2f; font-weight: bold; margin-top: 5px; }
        
        .needle-area { width: 100%; height: 35px; position: relative; margin-top: 10px; }
        .needle { 
            position: absolute; left: 50%; width: 4px; height: 30px; 
            background: #ff3d00; transform: translateX(-50%); transition: left 0.08s linear; 
        }
        .center-line { position: absolute; left: 50%; height: 100%; width: 2px; background: #000; opacity: 0.2; }

        .control-section { flex: 1.2; background: var(--bridge); display: flex; flex-direction: column; overflow: hidden; }
        .tabs { display: flex; background: #2d1b18; }
        .tab { flex: 1; padding: 15px; text-align: center; font-weight: bold; color: #888; font-size: 0.9rem; cursor: pointer; }
        .tab.active { color: white; border-bottom: 4px solid var(--gold); background: rgba(255,255,255,0.05); }
        
        .grid { flex: 1; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; }
        .note-btn { 
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
            padding: 18px; border-radius: 12px; text-align: center; color: white; cursor: pointer;
        }
        .note-btn.active { background: var(--gold); color: #7b241c; font-weight: bold; border-color: white; }
        .note-btn b { font-size: 1.3rem; display: block; }

        /* Overlay */
        #overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px;
        }
        #start-btn { padding: 22px 60px; font-size: 2em; background: var(--gold); border: none; border-radius: 50px; font-weight: bold; color: #7b241c; cursor: pointer; }
        .ver-tag { margin-top: 20px; color: #aaa; font-size: 0.85rem; letter-spacing: 1px; }

        /* Responsive Desktop */
        @media (min-width: 992px) {
            body { flex-direction: row; }
            .visual-box, .display-box { flex: 1; height: 100%; }
            .control-section { width: 450px; height: 100%; }
            .hz-live { font-size: 5rem; }
        }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="color: var(--gold); margin-bottom: 5px;">ตั้งสายขิม</h1>
    <button id="start-btn">เริ่มใช้งาน</button>
    <div id="version-text" class="ver-tag">กำลังตรวจสอบอุปกรณ์...</div>
</div>

<div class="visual-box">
    <svg id="khim-svg" viewBox="0 0 140 85">
        <path d="M25,10 L115,10 Q140,10 135,40 Q130,75 115,77 L25,77 Q10,75 5,40 Q0,10 25,10 Z" fill="#3e2723"/>
        <path d="M28,13 L112,13 Q132,13 128,40 Q124,70 112,72 L28,72 Q15,70 11,40 Q7,13 28,13 Z" fill="#5d4037"/>
        <rect x="55" y="15" width="2" height="58" fill="#b71c1c"/> 
        <rect x="85" y="15" width="2" height="58" fill="#b71c1c"/> 
        <g id="strings-group"></g>
    </svg>
</div>

<div class="display-box">
    <div id="note-name" style="font-size: 1.6rem; font-weight: bold; color: #000;">โด</div>
    <div id="live-hz" class="hz-live">---</div>
    <div id="target-hz" class="hz-target">508.5 Hz</div>
    <div class="needle-area">
        <div class="center-line"></div>
        <div id="needle" class="needle"></div>
    </div>
</div>

<div class="control-section">
    <div class="tabs">
        <div class="tab" id="tab-left" onclick="setBridge('left')">นอก</div>
        <div class="tab active" id="tab-middle" onclick="setBridge('middle')">กลาง</div>
        <div class="tab" id="tab-right" onclick="setBridge('right')">ใน</div>
    </div>
    <div id="grid" class="grid"></div>
</div>

<script>
    let audioCtx, analyser, sr, isMobile;
    let target = 508.5, bridge = 'middle';
    
    // ข้อมูลความถี่และชื่อโน้ตเดิมของคุณ (Fixed)
    const hzData = {
        left: [754.6, 683.4, 618.9, 560.5, 507.6, 459.7, 416.3],
        middle: [508.5, 460.5, 417.0, 377.6, 342.0, 309.7, 280.5],
        right: [342.0, 309.7, 280.5, 254.0, 230.0, 208.3, 188.6]
    };
    const noteNames = {
        left: ["ซอล(ส)", "ฟาร์", "มี", "เร", "โด", "ที", "ลา"],
        middle: ["โด", "ที", "ลา", "ซอล", "ฟาร์", "มี", "เร"],
        right: ["ฟาร์", "มี", "เร", "โด", "ที", "ลา", "ซอล(ท)"]
    };

    // 1. ตรวจสอบอุปกรณ์ทันที
    isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    document.getElementById('version-text').innerText = isMobile ? "MOBILE MODE: STABLE" : "DESKTOP MODE: PRECISION";

    function setBridge(b) {
        bridge = b;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + b).classList.add('active');
        renderGrid();
    }

    function renderGrid() {
        const g = document.getElementById('grid');
        g.innerHTML = '';
        noteNames[bridge].forEach((n, i) => {
            const h = hzData[bridge][i];
            const btn = document.createElement('div');
            btn.className = `note-btn ${Math.abs(h - target) < 0.1 ? 'active' : ''}`;
            btn.innerHTML = `<b>${n}</b>${h} Hz`;
            btn.onclick = () => { 
                target = h; 
                document.getElementById('note-name').innerText = n; 
                document.getElementById('target-hz').innerText = h + ' Hz'; 
                pitchBuffer = []; // ล้าง Buffer เสียงเก่าเมื่อเปลี่ยนโน้ต
                renderGrid(); 
            };
            g.appendChild(btn);
        });
    }

    // 2. ฟังก์ชันเริ่มการทำงาน (แก้ปัญหาปุ่มค้าง)
    async function startApp() {
        try {
            // ขออนุญาตใช้ไมค์ ปิดระบบช่วยเสียงของมือถือทั้งหมด
            const constraints = { 
                audio: { 
                    echoCancellation: false, 
                    noiseSuppression: false, 
                    autoGainControl: false 
                } 
            };

            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            
            // สร้าง AudioContext (รองรับทั้งรุ่นเก่า/ใหม่)
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            sr = audioCtx.sampleRate;
            
            // สำคัญ: ต้อง Resume สำหรับ Mobile
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }

            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048; // ใช้ขนาดเดิมเพื่อความแม่นยำระดับหนึ่ง
            
            audioCtx.createMediaStreamSource(stream).connect(analyser);
            
            // ปิดหน้ากากเข้าสู่โปรแกรม
            document.getElementById('overlay').style.display = 'none';
            tick();
            
        } catch(e) { 
            alert("ไม่สามารถใช้งานได้: กรุณาอนุญาตให้เข้าถึงไมโครโฟน");
        }
    }

    // 3. วนลูปคำนวณเสียง
    let pitchBuffer = []; // เก็บค่า Pitch เพื่อหา Median
    function tick() {
        const buf = new Float32Array(analyser.fftSize);
        analyser.getFloatTimeDomainData(buf);
        
        // เลือก Engine ตามอุปกรณ์
        const rawPitch = isMobile ? getPitchAMDF_Stable(buf) : getPitchAC(buf);
        
        // --- ส่วน Mobile-Only Stabilizer ---
        if (isMobile) {
            if (rawPitch > 50 && rawPitch < 1200) {
                pitchBuffer.push(rawPitch);
                // เก็บแค่ 5 ค่าล่าสุดเพื่อหา Median (ลดอาการกระโดด)
                if (pitchBuffer.length > 5) pitchBuffer.shift();
            } else {
                // ถ้าจับเสียงไม่ได้ ให้ค่อยๆ ล้าง Buffer
                if (pitchBuffer.length > 0) pitchBuffer.shift();
            }
            
            // หาค่า Median (ค่ากลาง) ของ Buffer
            if (pitchBuffer.length >= 3) {
                const sorted = [...pitchBuffer].sort((a, b) => a - b);
                const medianPitch = sorted[Math.floor(sorted.length / 2)];
                updateUI(medianPitch);
            }
        } else {
            // โหมดคอม: แสดงผลตรงๆ ( AC แม่นอยู่แล้ว)
            if (rawPitch > 0) updateUI(rawPitch);
        }
        
        requestAnimationFrame(tick);
    }

    // ฟังก์ชันอัปเดตเข็มและตัวเลข
    function updateUI(p) {
        document.getElementById('live-hz').innerText = p.toFixed(1);
        const diff = p - target;
        const pos = 50 + (diff * 4); // ปรับ Sensitivity เข็ม
        document.getElementById('needle').style.left = Math.max(5, Math.min(95, pos)) + '%';
        document.getElementById('live-hz').style.color = Math.abs(diff) < 0.8 ? '#00e676' : '#7b241c';
    }

    // ENGINE มือถือเวอร์ชันปรับปรุง (เสถียรขึ้น)
    function getPitchAMDF_Stable(buf) {
        let size = buf.length / 2; // คำนวณครึ่งหนึ่ง
        let minSum = Infinity, bestTau = -1;
        
        // 1. เช็คความดัง (ต้องดังพอสมควรถึงจะคำนวณ เพื่อเลี่ยงเสียงรบกวน)
        let rms = 0; for(let i=0; i<size; i++) rms += buf[i]*buf[i];
        if (Math.sqrt(rms/size) < 0.02) return -1; // เพิ่ม Threshold ความดัง

        // 2. AMDF ค้นหาค่าเบี่ยงเบนต่ำสุด
        // จำกัดช่วง Tau ให้แคบลงเฉพาะช่วงเสียงขิม (ประมาณ 100-1100 Hz)
        const minTau = Math.round(sr / 1100);
        const maxTau = Math.round(sr / 100);
        
        for (let tau = minTau; tau < maxTau; tau++) {
            let sum = 0;
            for (let i = 0; i < size; i++) sum += Math.abs(buf[i] - buf[i+tau]);
            
            if (sum < minSum) {
                minSum = sum;
                bestTau = tau;
            }
        }
        
        // 3. ตรวจสอบคุณภาพของ Pitch (ถ้ายอด AMDF ไม่ชัดเจน ให้ทิ้ง)
        if (minSum / (rms * size) > 0.8) return -1; // ถ้ายอดมันตื้นเกินไป แสดงว่าเป็นเสียงรบกวน

        return sr / bestTau;
    }

    // ENGINE คอม (Auto-Correlation: แม่นยำสูง)
    function getPitchAC(buf) {
        let size = buf.length;
        let rms = 0; for(let i=0; i<size; i++) rms += buf[i]*buf[i];
        if (Math.sqrt(rms/size) < 0.01) return -1;

        let c = new Float32Array(size);
        for (let i=0; i<size; i++) {
            for (let j=0; j<size-i; j++) c[i] += buf[j]*buf[j+i];
        }
        let d = 0; while (c[d] > c[d+1]) d++;
        let maxVal = -1, maxPos = -1;
        for (let i=d; i<size; i++) {
            if (c[i] > maxVal) { maxVal = c[i]; maxPos = i; }
        }
        return sr / maxPos;
    }

    // ผูกเหตุการณ์ปุ่มกด
    document.getElementById('start-btn').addEventListener('click', startApp);
    
    // วาดเส้นสายขิมประกอบเมื่อโหลดเสร็จ
    window.onload = () => {
        const sg = document.getElementById('strings-group');
        for(let i=0; i<7; i++) {
            let y = 20 + (i*8);
            sg.innerHTML += `<line x1="12" y1="${y}" x2="128" y2="${y}" stroke="#1a0f0d" stroke-width="0.5" opacity="0.2"></line>`;
        }
        renderGrid();
    };
</script>
</body>
</html>
